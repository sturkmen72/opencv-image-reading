image: Ubuntu2204

platform:
  - ARM

install:
  - sudo apt-get -y install libavif-dev
  - sudo apt-get install libjpeg-dev libpng-dev libtiff-dev libgif-dev libwebp-dev -y
  - git clone --depth=1 --branch=spng-dev https://github.com/sturkmen72/opencv.git
  - git clone --depth=1 --branch=animated_webp_support https://github.com/sturkmen72/opencv_extra.git
  - export OPENCV_TEST_DATA_PATH=$(pwd)/opencv_extra/testdata
  - mkdir build-opencv
  - cd build-opencv
  - cmake -DWITH_SPNG=ON -DWITH_ZLIB_NG=ON -DWITH_AVIF=OFF -DWITH_JPEG=ON -DWITH_JASPER=OFF -DWITH_TIFF=OFF -DWITH_OPENJPEG=OFF -DWITH_WEBP=OFF -DWITH_OPENEXR=OFF -DWITH_IPP=OFF -DWITH_ADE=OFF -DWITH_ITT=OFF -DBUILD_IPP_IW=OFF -DBUILD_ITT=OFF -DBUILD_OPENEXR=OFF -DBUILD_OPENJPEG=OFF -DBUILD_PROTOBUF=OFF -DBUILD_WEBP=OFF -DBUILD_PERF_TESTS=ON -DBUILD_JAVA=OFF -DBUILD_opencv_apps=OFF -DBUILD_opencv_dnn=OFF -DBUILD_opencv_gapi=OFF -DBUILD_opencv_features2d=OFF -DBUILD_opencv_flann=OFF -DBUILD_opencv_video=OFF -DBUILD_opencv_ml=OFF -DBUILD_opencv_objdetect=OFF -DBUILD_opencv_photo=OFF -DBUILD_opencv_calib3d=OFF -DBUILD_opencv_stitching=OFF -DCMAKE_BUILD_TYPE=Release ../opencv
  - make
  - cd ..
  - cd build-opencv/bin/
  - ./opencv_test_imgcodecs

build_script:
  - cmd: md build
  - cmd: cd build
  - cmd: cmake ..
  - cmd: cmake --build . --config Release
  - cmd: cd bin
  - cmd: test1

artifacts:
  - path: /home/appveyor/projects/opencv_extra/testdata/highgui/OpenCV_logo_white.png
    name: OpenCV_logo_white.webp
  - path: /home/appveyor/projects/opencv_extra/testdata/highgui/OpenCV_logo_white.tif
    name: OpenCV_logo_white.tif
  - path: /home/appveyor/projects/opencv_extra/testdata/highgui/OpenCV_logo_white.avif
    name: OpenCV_logo_white.avif

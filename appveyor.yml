image: Ubuntu2204

platform:
  - x64  # Use x64 unless you're explicitly building for ARM

install:
  - sudo apt-get update
  - sudo apt-get install libgif-dev libwebp-dev libavif-dev -y
  - git clone --depth=1 --branch=avif https://github.com/sturkmen72/opencv.git
  - git clone --depth=1 --branch=animated_webp_support https://github.com/sturkmen72/opencv_extra.git
  - export OPENCV_TEST_DATA_PATH=$(pwd)/opencv_extra/testdata
  - mkdir build-opencv
  - cd build-opencv
  - cmake -DWITH_PNG=ON \
          -DWITH_ZLIB_NG=ON \
          -DBUILD_WEBP=ON \
          -DWITH_AVIF=ON \
          -DWITH_JPEG=ON \
          -DWITH_JASPER=OFF \
          -DWITH_TIFF=OFF \
          -DWITH_OPENJPEG=OFF \
          -DWITH_OPENEXR=OFF \
          -DWITH_IPP=OFF \
          -DWITH_ADE=OFF \
          -DWITH_ITT=OFF \
          -DBUILD_IPP_IW=OFF \
          -DBUILD_ITT=OFF \
          -DBUILD_PROTOBUF=OFF \
          -DBUILD_PERF_TESTS=OFF \
          -DBUILD_JAVA=OFF \
          -DBUILD_opencv_apps=OFF \
          -DBUILD_opencv_dnn=OFF \
          -DBUILD_opencv_gapi=OFF \
          -DBUILD_opencv_features2d=OFF \
          -DBUILD_opencv_flann=OFF \
          -DBUILD_opencv_video=OFF \
          -DBUILD_opencv_ml=OFF \
          -DBUILD_opencv_objdetect=OFF \
          -DBUILD_opencv_photo=OFF \
          -DBUILD_opencv_calib3d=OFF \
          -DBUILD_opencv_stitching=OFF \
          -DCMAKE_BUILD_TYPE=Release ../opencv
  - make -j$(nproc)
  - cd bin
  - ./opencv_test_imgcodecs

build_script:
  - mkdir build
  - cd build
  - cmake ..
  - cmake --build . --config Release

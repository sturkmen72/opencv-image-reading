image: macOS-Catalina

environment:
  global:
    HOMEBREW_NO_INSTALL_CLEANUP: 1
    CURL_SSL_BACKEND: 'secure-transport'
    HOMEBREW_FORCE_BREWED_CURL: 1
    HOMEBREW_NO_AUTO_UPDATE: 1

platform:
  - ARM

install:
  - git clone --depth=1 --branch=zlib-help https://github.com/sturkmen72/opencv.git
  - git clone --depth=1 --branch=4.x https://github.com/opencv/opencv_extra.git
  - brew install nasm
  - mkdir build-opencv
  - cd build-opencv
  - cmake -DWITH_ZLIB_NG=ON -DWITH_JPEG=ON -DWITH_JASPER=OFF -DWITH_TIFF=ON -DWITH_OPENJPEG=OFF -DWITH_WEBP=OFF -DWITH_OPENEXR=OFF -DWITH_IPP=OFF -DWITH_ADE=OFF -DWITH_ITT=OFF -DBUILD_IPP_IW=OFF -DBUILD_ITT=OFF -DBUILD_OPENEXR=OFF -DBUILD_OPENJPEG=OFF -DBUILD_PROTOBUF=OFF -DBUILD_WEBP=OFF -DBUILD_PERF_TESTS=ON -DBUILD_JAVA=OFF -DBUILD_opencv_apps=OFF -DBUILD_opencv_dnn=OFF -DBUILD_opencv_gapi=OFF -DBUILD_opencv_features2d=OFF -DBUILD_opencv_flann=OFF -DBUILD_opencv_video=OFF -DBUILD_opencv_ml=OFF -DBUILD_opencv_objdetect=OFF -DBUILD_opencv_photo=OFF -DBUILD_opencv_calib3d=OFF -DBUILD_opencv_stitching=OFF -DCMAKE_BUILD_TYPE=Release ../opencv
  - make -j8
  - cd ..
  - export OPENCV_TEST_DATA_PATH="$PWD/opencv_extra/testdata"
  - cd build-opencv/bin/
  - ./opencv_test_imgcodecs
  - ./opencv_perf_imgcodecs

